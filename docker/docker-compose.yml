services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: knowledge_ai_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: knowledge_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowledge_ai_network

  # Milvus Vector Database
  milvus:
    image: milvusdb/milvus:v2.3.11
    container_name: knowledge_ai_milvus
    command: milvus run standalone
    depends_on:
      - minio
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: minio
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: milvus-bucket
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    # 设置资源限制
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    healthcheck:
      test: 
        - CMD
        - curl
        - -f
        - http://localhost:9091/healthz
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - knowledge_ai_network
    restart: unless-stopped

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: knowledge_ai_minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_STORAGE_USE_SSL: "false"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowledge_ai_network
    restart: unless-stopped

  # FastAPI Application
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: knowledge_ai_api
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/knowledge_ai
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      STORAGE_TYPE: minio
      S3_ENDPOINT: http://minio:9000
      LOG_LEVEL: INFO
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ..:/app
      - ../data:/app/data
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - knowledge_ai_network
    restart: unless-stopped

  # Prometheus for Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: knowledge_ai_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - knowledge_ai_network
    restart: unless-stopped

networks:
  knowledge_ai_network:
    driver: bridge

volumes:
  postgres_data:
  milvus_data:
  minio_data:
  prometheus_data:
