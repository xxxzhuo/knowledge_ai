global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'knowledge-ai'
    static_configs:
      - targets: ['localhost:8001']
  
  - job_name: 'milvus'
    static_configs:
      - targets: ['milvus:9091']
  
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
